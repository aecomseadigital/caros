  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);

  .container{max-width:1200px;margin:0 auto;padding:4rem 1.5rem;}
  h1{font-size:clamp(2.5rem,6vw,4rem);font-weight:600;color:var(--text-prom);margin:0 0 .5rem;}
  .lead{color:var(--text-prom);margin:0 0 2.5rem;font-size:1.05rem;}
  .search{width:100%;background:transparent;color:var(--text-prom);border:none;
    border-bottom:1px solid var(--border);font-size:clamp(1.25rem,3vw,2rem);
    padding:.5rem 0;margin-bottom:2.5rem;caret-color:var(--accent);outline:none;}
  .search:focus{border-bottom-color:var(--accent);}
  .search::placeholder{color:var(--text-sub);}
  .count{color:var(--text-sub);font-size:.9rem;margin-bottom:1.5rem;min-height:1.2em;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem;}
  @media(min-width:1024px){.grid{grid-template-columns:repeat(3,1fr);}}
  .card{display:flex;flex-direction:column;background:var(--bg);border:1px solid var(--border);
    border-radius:15px;padding:1.5rem;transition:transform .2s ease,box-shadow .2s ease;}
  .card:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,.08);}
  .card h2{font-size:1rem;font-weight:600;color:var(--text-prom);margin:0 0 .6rem;}
  .card p{font-size:.875rem;line-height:1.5;color:var(--text);margin:0 0 1.25rem;flex:1;}
  .install{display:inline-flex;align-items:center;gap:.4rem;align-self:flex-start;
    font-size:.8rem;color:var(--text-sub);text-decoration:none;transition:color .2s;}
  .install:hover{color:var(--accent);}
  .install svg{width:15px;height:15px;}
  .note{font-size:.75rem;color:var(--text-sub);font-style:italic;}
  footer{color:var(--text-sub);font-size:.8rem;text-align:center;padding:2rem 1.5rem;}
  a{color:inherit;}
</style>

    "install": "caros://extension?cmd=npx&arg=-y&arg=tavily-mcp&id=tavily&name=Tavily%20Web%20Search&description=Web%20search%20capabilities%20powered%20by%20Tavily&env=TAVILY_API_KEY%3DAPI%20key%20for%20Tavily%20web%20search%20service"
  },
  {
    "name": "YouTube Transcript",
    "description": "YouTube video transcript extraction",
    "install": "caros://extension?cmd=uvx&arg=--from&arg=git%2Bhttps%3A%2F%2Fgithub.com%2Fjkawamoto%2Fmcp-youtube-transcript&arg=mcp-youtube-transcript&id=youtube-transcript-mcp&name=YouTube%20Transcript&description=YouTube%20video%20transcript%20extraction"
  }
];
const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const search = document.getElementById('search');
function svgDownload(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
}
function render(q){
  const query=(q||'').trim().toLowerCase();
  const list=query?EXTENSIONS.filter(e=>(e.name+' '+e.description).toLowerCase().includes(query)):EXTENSIONS;
  countEl.textContent=query?`${list.length} result${list.length===1?'':'s'} for "${q.trim()}"`:'';
  grid.innerHTML=list.map(e=>{
    const action=e.install
      ?`<a class="install" href="${e.install}"><span>Install</span>${svgDownload()}</a>`
      :`<span class="note">Requires local setup</span>`;
    const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="card"><h2>${esc(e.name)}</h2><p>${esc(e.description)}</p>${action}</div>`;
  }).join('');
}
search.addEventListener('input',e=>render(e.target.value));
render('');
</script>
</body>
</html>
